name: Docker Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  docker-integration-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Run Docker Integration Tests
      run: |
        pytest tests/test_docker_integration.py -v -s
      timeout-minutes: 15
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: docker-test-results
        path: |
          pytest-results.xml
          test-logs/
    
    - name: Clean up Docker resources
      if: always()
      run: |
        docker ps -a | grep bgchof-test || true
        docker stop bgchof-test-container 2>/dev/null || true
        docker rm bgchof-test-container 2>/dev/null || true
        docker rmi bgchof-test-image 2>/dev/null || true

