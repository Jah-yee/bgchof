[tox]
envlist = py310,py311,py312,py313,py314
skip_missing_interpreters = true

[testenv]
deps =
    pytest>=8.0.0
    pytest-cov>=4.1.0
    ruff>=0.3.0
    mypy>=1.8.0
commands =
    ruff check src/ tests/
    ruff format --check src/ tests/
    mypy src/
    pytest --cov=src --cov-report=term-missing --cov-report=html